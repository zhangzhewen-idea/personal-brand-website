server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: pbw-java-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://192.168.50.6:3306/personal_brand_website?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:nsync81563241}
  data:
    redis:
      host: ${REDIS_HOST:192.168.50.6}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    deserialization:
      fail-on-unknown-properties: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 101MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  api-docs:
    path: /v3/api-docs
    version: openapi_3_1
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

pbw:
  security:
    jwt-secret: ${JWT_SECRET:pbw-local-development-secret-must-be-at-least-32-bytes}
    access-token-ttl: 2h
    reset-token-ttl: 15m
  storage:
    root: ${STORAGE_ROOT:./uploads}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:8080/uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:8081}

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"
  file:
    name: log/main.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB